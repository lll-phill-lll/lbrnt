<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Labyrinth — Игра</title>
  <style>
    :root{--sidebar:300px;}
    *,*::before,*::after{box-sizing:border-box;}
    html,body{margin:0;height:100%;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;background:#0b0d12;color:#e9edf7;}
    .wrap{display:grid;grid-template-columns:var(--sidebar) 1fr;height:100vh;}
    .sidebar{padding:12px;border-right:1px solid rgba(255,255,255,.12);background:rgba(14,16,22,.95);overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
    .content{display:flex;flex-direction:column;min-width:0;min-height:0;}
    .topbar{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.12);background:rgba(14,16,22,.95);display:flex;gap:10px;align-items:center;flex-shrink:0;}
    .viewer{flex:1;min-height:0;position:relative;overflow:hidden;}
    #drawCanvas{position:absolute;inset:0;width:100%;height:100%;display:block;cursor:crosshair;}
    #toastContainer{position:fixed;top:12px;right:12px;z-index:300;display:flex;flex-direction:column;gap:6px;pointer-events:none;max-width:380px;width:100%;}
    .toast{pointer-events:auto;background:rgba(20,22,30,.95);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:10px 14px;font-size:13px;line-height:1.4;color:#e9edf7;box-shadow:0 4px 16px rgba(0,0,0,.5);animation:toastIn .25s ease-out;backdrop-filter:blur(8px);}
    .toast.out{animation:toastOut .2s ease-in forwards;}
    .toast.self{border-left:3px solid #51cf66;}
    .toast.other{border-left:3px solid #339af0;}
    .toast.system{border-left:3px solid #868e96;color:#9aa4b2;}
    .toast .toast-who{font-weight:600;font-size:12px;margin-bottom:2px;color:#9aa4b2;}
    @keyframes toastIn{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
    @keyframes toastOut{from{opacity:1;transform:translateX(0);}to{opacity:0;transform:translateX(40px);}}
    label{font-size:12px;color:#9aa4b2;white-space:nowrap;}
    input,select,button{font:inherit;font-size:13px;color:#e9edf7;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:5px 8px;outline:none;}
    input:focus,select:focus{border-color:rgba(122,162,255,.6);}
    button{cursor:pointer;transition:border-color .15s;}
    button:hover{border-color:rgba(255,255,255,.3);}
    button.active{border-color:rgba(122,162,255,.8);box-shadow:0 0 0 2px rgba(122,162,255,.15) inset;}
    .title{font-weight:700;font-size:13px;margin-bottom:6px;}
    .card{border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px;background:rgba(0,0,0,.2);}
    .muted{font-size:12px;color:#9aa4b2;}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    .hidden{display:none!important;}
    .palette{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-top:6px;}
    .sw{width:100%;aspect-ratio:1/1;border-radius:6px;border:2px solid transparent;cursor:pointer;}
    .sw.active{border-color:#fff;box-shadow:0 0 0 2px rgba(122,162,255,.3);}
    #mapOverlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.85);display:flex;justify-content:center;align-items:center;}
    #mapOverlay .inner{background:#1a1d26;border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:16px;max-width:92vw;max-height:92vh;overflow:auto;position:relative;}
    #mapOverlay .close{position:absolute;top:8px;right:12px;background:none;border:none;color:#e9edf7;font-size:22px;cursor:pointer;}
    .item-card{border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px;background:rgba(255,255,255,.03);margin-bottom:6px;}
    .item-card.disabled{opacity:.4;pointer-events:none;}
    .item-header{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
    .item-header .item-name{font-weight:600;font-size:13px;}
    .item-header .item-charges{font-size:11px;color:#868e96;margin-left:auto;}
    .item-header .info-icon{width:16px;height:16px;border-radius:50%;border:1px solid rgba(255,255,255,.2);display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#9aa4b2;cursor:help;position:relative;flex-shrink:0;}
    .info-icon .tooltip{display:none;position:fixed;background:#1a1d26;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:8px 10px;font-size:11px;line-height:1.4;color:#ced4da;white-space:normal;width:220px;max-width:90vw;z-index:200;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.5);}
    .item-dirs{display:flex;gap:4px;}
    .item-dirs button{font-size:12px;padding:3px 8px;}
    .turn-badge{font-size:12px;padding:3px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#9aa4b2;transition:all .2s;}
    .turn-badge.current{background:rgba(81,207,102,.15);border-color:rgba(81,207,102,.4);color:#51cf66;font-weight:600;}
    .turn-badge.me{border-color:rgba(122,162,255,.4);}
    .turn-badge.me.current{background:rgba(81,207,102,.25);border-color:#51cf66;color:#fff;}
  </style>
</head>
<body>
<div class="wrap">
  <aside class="sidebar">
    <!-- Game info -->
    <div class="card">
      <div class="title" id="roomTitle">Комната</div>
      <div id="turnInfo" class="muted">—</div>
      <div id="turnOrder" style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;"></div>
      <div style="margin-top:8px;">
        <div class="muted" style="margin-bottom:4px;">Движение</div>
        <div class="row">
          <button data-move="up">↑</button>
          <button data-move="left">←</button>
          <button data-move="down">↓</button>
          <button data-move="right">→</button>
        </div>
      </div>
      <div id="itemsPanel" style="margin-top:8px;"></div>
      <div class="muted" style="margin-top:8px;">Стрелки: ход · Shift+стрелка: атака · Ctrl/Alt+стрелка: предмет</div>
    </div>

    <!-- Creator controls -->
    <div class="card hidden" id="creatorCard">
      <div class="title">Управление</div>
      <div class="row" style="margin-bottom:8px;">
        <button id="viewMapBtn">Показать лабиринт</button>
      </div>
      <div class="row">
        <label style="display:flex;gap:6px;align-items:center;cursor:pointer;min-width:auto;">
          <input type="checkbox" id="turnsToggle" checked/>
          Очерёдность ходов
        </label>
      </div>
    </div>

    <!-- Drawing tools -->
    <div class="card">
      <div class="title">Рисование</div>
      <div class="row">
        <button class="active" data-mode="paint">Заливка</button>
        <button data-mode="border">Стена</button>
        <button data-mode="shapes">Объект</button>
        <button data-mode="line">Линия</button>
        <button data-mode="erase">Стёрка</button>
      </div>
      <div class="row" style="margin-top:6px;">
        <button id="trailToggle" style="font-size:12px;">🖊 След за объектом</button>
      </div>
      <div class="row" style="margin-top:8px;">
        <label>Цвет</label>
        <input id="drawColor" type="color" value="#2f7cff" style="width:36px;height:28px;padding:0;"/>
      </div>
      <div id="palette" class="palette"></div>
      <div style="margin-top:8px;"><button id="clearDraw">Очистить</button></div>
      <div class="muted" style="margin-top:6px;">Объект: клик — поставить, стрелки — двигать, Del — удалить. Колёсико — зум, ПКМ — панорама.</div>
    </div>
  </aside>

  <main class="content">
    <div class="topbar">
      <span style="font-weight:600;">Labyrinth</span>
      <span class="muted" id="playerLabel"></span>
      <span style="flex:1"></span>
      <span class="muted" id="coordLabel">(—, —)</span>
      <span class="muted" id="zoomLabel">1.00x</span>
    </div>
    <div class="viewer"><canvas id="drawCanvas"></canvas></div>
  </main>
</div>
<div id="toastContainer"></div>

<div id="mapOverlay" class="hidden">
  <div class="inner">
    <button class="close" id="closeMap">&times;</button>
    <div id="mapContent"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="./game.js"></script>
</body>
</html>
