<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Labyrinth — Лобби</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;}
    html,body{margin:0;height:100%;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;background:#0b0d12;color:#e9edf7;}
    .center{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;}
    .panel{width:100%;max-width:440px;}
    .card{border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:20px;background:rgba(0,0,0,.25);margin-bottom:16px;}
    .title{font-weight:700;font-size:18px;margin-bottom:12px;}
    .subtitle{font-weight:600;font-size:14px;margin-bottom:8px;color:#9aa4b2;}
    .row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
    label{font-size:13px;color:#9aa4b2;min-width:90px;}
    input,select,button{font:inherit;font-size:14px;color:#e9edf7;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:8px 12px;outline:none;width:100%;}
    input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
    input[type="number"]{-moz-appearance:textfield;}
    input:focus{border-color:rgba(122,162,255,.6);}
    button{cursor:pointer;text-align:center;transition:border-color .15s;}
    button:hover{border-color:rgba(255,255,255,.3);}
    button.primary{background:rgba(122,162,255,.2);border-color:rgba(122,162,255,.5);}
    button.primary:hover{background:rgba(122,162,255,.3);}
    .status{font-size:13px;color:#9aa4b2;margin-top:8px;min-height:20px;}
    .status.error{color:#ff6b6b;}
    .status.ok{color:#51cf66;}
    .divider{height:1px;background:rgba(255,255,255,.1);margin:16px 0;}
    .playerList{font-size:13px;color:#ced4da;margin:8px 0;line-height:1.6;}
    .playerList span{display:inline-block;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:2px 8px;margin:2px 4px 2px 0;}
    .waiting{text-align:center;padding:30px 20px;}
    .waiting .spinner{display:inline-block;width:24px;height:24px;border:3px solid rgba(255,255,255,.15);border-top-color:rgba(122,162,255,.7);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .hidden{display:none!important;}
    .small{font-size:12px;color:#868e96;}
    .row-compact{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
  </style>
</head>
<body>
<div class="center">
  <div class="panel">

    <!-- Tab selector -->
    <div class="row" style="margin-bottom:16px;">
      <button id="tabCreate" class="primary" onclick="showTab('create')">Создать комнату</button>
      <button id="tabJoin" onclick="showTab('join')">Войти в комнату</button>
    </div>

    <!-- CREATE ROOM -->
    <div id="createView" class="card">
      <div class="title">Создать комнату</div>
      <div class="row"><label>ID комнаты</label><input id="cRoom" placeholder="my-game"/></div>
      <div class="row"><label>Ваше имя</label><input id="cName" placeholder="Как вас зовут?"/></div>
      <div class="row"><label>Пароль</label><input id="cPassword" type="password" placeholder="необязательно"/></div>
      <div class="divider"></div>
      <div class="subtitle">Настройки карты</div>
      <div class="row-compact">
        <div class="row"><label>Ширина</label><input id="cWidth" type="number" value="12" min="4" max="50" style="width:60px;"/></div>
        <div class="row"><label>Высота</label><input id="cHeight" type="number" value="12" min="4" max="50" style="width:60px;"/></div>
      </div>
      <div class="row-compact">
        <div class="row"><label>Открытость</label><input id="cOpenness" type="number" step="0.1" value="0.5" min="0" max="1" style="width:60px;"/></div>
        <div class="row"><label>Seed</label><input id="cSeed" type="number" value="" placeholder="random" style="width:80px;"/></div>
      </div>
      <div class="row"><label>Ходов за раунд</label><input id="cActions" type="number" value="1" min="1" max="10" style="width:60px;"/></div>
      <div class="subtitle" style="margin-top:8px;">Оружие на карте</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;">
        <label style="min-width:auto;display:flex;gap:4px;align-items:center;cursor:pointer;"><input type="checkbox" value="shotgun" class="weaponCheck" checked/> Дробовик</label>
        <label style="min-width:auto;display:flex;gap:4px;align-items:center;cursor:pointer;"><input type="checkbox" value="rifle" class="weaponCheck" checked/> Ружьё</label>
        <label style="min-width:auto;display:flex;gap:4px;align-items:center;cursor:pointer;"><input type="checkbox" value="flashlight" class="weaponCheck" checked/> Фонарь</label>
      </div>
      <button id="createBtn" class="primary">Создать</button>
      <div id="createStatus" class="status"></div>
    </div>

    <!-- WAITING ROOM (shown after create) -->
    <div id="waitingRoomView" class="card hidden">
      <div class="title">Комната: <span id="wrRoomName"></span></div>
      <div class="subtitle">Ожидание игроков</div>
      <div id="wrPlayers" class="playerList">Пока никого...</div>
      <button id="startBtn" class="primary" style="margin-top:12px;">Начать игру</button>
      <div id="startStatus" class="status"></div>
      <div class="small" style="margin-top:8px;">Пароль для входа: <code id="wrPassword"></code></div>
    </div>

    <!-- JOIN ROOM -->
    <div id="joinView" class="card hidden">
      <div class="title">Войти в комнату</div>
      <div class="row"><label>ID комнаты</label><input id="jRoom" placeholder="my-game"/></div>
      <div class="row"><label>Пароль</label><input id="jPassword" type="password" placeholder=""/></div>
      <div class="row"><label>Ваше имя</label><input id="jName" placeholder="Как вас зовут?"/></div>
      <button id="joinBtn" class="primary">Войти</button>
      <div id="joinStatus" class="status"></div>
    </div>

    <!-- WAITING FOR START (shown after join) -->
    <div id="waitingStartView" class="card hidden">
      <div class="waiting">
        <div class="spinner"></div>
        <div class="title">Ожидание начала игры</div>
        <div class="subtitle">Комната: <span id="wsRoomName"></span></div>
        <div id="wsPlayers" class="playerList"></div>
        <div class="small">Вы: <strong id="wsMyName"></strong></div>
      </div>
    </div>

  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
(() => {
  const $ = id => document.getElementById(id);
  const socket = io('/', { transports: ['websocket'] });

  let currentTab = 'create';
  let createdRoom = null;
  let creatorName = null;

  window.showTab = (tab) => {
    currentTab = tab;
    $('tabCreate').classList.toggle('primary', tab === 'create');
    $('tabJoin').classList.toggle('primary', tab === 'join');
    $('createView').classList.toggle('hidden', tab !== 'create');
    $('joinView').classList.toggle('hidden', tab !== 'join');
    $('waitingRoomView').classList.add('hidden');
    $('waitingStartView').classList.add('hidden');
  };

  function emit(ev, payload) {
    return new Promise(resolve => socket.emit(ev, payload, resp => resolve(resp)));
  }

  function goToGame(room, name, password) {
    const params = new URLSearchParams({ room, name, password: password || '' });
    sessionStorage.setItem('lab_session', JSON.stringify({ room, name, password: password || '' }));
    window.location.href = '/game?' + params.toString();
  }

  // ── Create Room ──
  $('createBtn').addEventListener('click', async () => {
    const room = $('cRoom').value.trim();
    const name = $('cName').value.trim();
    const password = $('cPassword').value;
    if (!room) return ($('createStatus').textContent = 'Введите ID комнаты', $('createStatus').className = 'status error');
    if (!name) return ($('createStatus').textContent = 'Введите ваше имя', $('createStatus').className = 'status error');
    $('createStatus').textContent = 'Создаю...';
    $('createStatus').className = 'status';
    const weapons = [...document.querySelectorAll('.weaponCheck:checked')].map(c => c.value);
    const resp = await emit('createRoom', {
      room, password, name,
      width: Number($('cWidth').value) || 12,
      height: Number($('cHeight').value) || 12,
      openness: Number($('cOpenness').value) || 0.5,
      seed: $('cSeed').value ? Number($('cSeed').value) : undefined,
      turnActions: Number($('cActions').value) || 1,
      weapons,
    });
    if (resp?.ok) {
      createdRoom = room;
      creatorName = name;
      $('createView').classList.add('hidden');
      $('waitingRoomView').classList.remove('hidden');
      $('wrRoomName').textContent = room;
      $('wrPassword').textContent = password || '(нет)';
    } else {
      $('createStatus').textContent = resp?.error || 'Ошибка';
      $('createStatus').className = 'status error';
    }
  });

  // ── Start Game ──
  $('startBtn').addEventListener('click', async () => {
    $('startStatus').textContent = 'Запускаю...';
    $('startStatus').className = 'status';
    const resp = await emit('startGame', {});
    if (resp?.ok) {
      goToGame(createdRoom, creatorName, $('cPassword').value);
    } else {
      $('startStatus').textContent = resp?.error || 'Ошибка';
      $('startStatus').className = 'status error';
    }
  });

  // ── Join Room ──
  $('joinBtn').addEventListener('click', async () => {
    const room = $('jRoom').value.trim();
    const password = $('jPassword').value;
    const name = $('jName').value.trim();
    if (!room) return ($('joinStatus').textContent = 'Введите ID комнаты', $('joinStatus').className = 'status error');
    if (!name) return ($('joinStatus').textContent = 'Введите имя', $('joinStatus').className = 'status error');
    $('joinStatus').textContent = 'Подключаюсь...';
    $('joinStatus').className = 'status';
    const resp = await emit('joinRoom', { room, password, name });
    if (!resp?.ok) {
      $('joinStatus').textContent = resp?.error || 'Ошибка';
      $('joinStatus').className = 'status error';
      return;
    }
    if (resp.started) {
      goToGame(room, name, password);
      return;
    }
    // Show waiting view
    $('joinView').classList.add('hidden');
    $('waitingStartView').classList.remove('hidden');
    $('wsRoomName').textContent = room;
    $('wsMyName').textContent = name;
  });

  // ── Live updates ──
  socket.on('waitingList', (data) => {
    const names = data?.players || [];
    if (createdRoom) {
      $('wrPlayers').innerHTML = names.length ? names.map(n => '<span>' + n + '</span>').join(' ') : 'Пока никого...';
    }
    $('wsPlayers').innerHTML = names.length ? names.map(n => '<span>' + n + '</span>').join(' ') : '';
  });

  socket.on('gameStarted', () => {
    // Only non-creators get redirected here; creator redirects from startGame callback
    if (createdRoom) return;
    const room = $('jRoom')?.value?.trim() || $('wsRoomName')?.textContent || '';
    const name = $('jName')?.value?.trim() || $('wsMyName')?.textContent || '';
    const password = $('jPassword')?.value || '';
    if (room && name) goToGame(room, name, password);
  });
})();
</script>
</body>
</html>
